name: Daily OSRS Tracker

on:
  schedule:
    - cron: "30 12 * * *"  # 8:30am EST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run script
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python main.py

      - name: Save stats JSON to repo
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/last_stats.json
          git commit -m "Daily stats update ${{ github.run_id }}" || echo "Nothing to commit"
          git push
